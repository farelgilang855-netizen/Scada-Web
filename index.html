<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generic SCADA I/O Panel</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-container">
    <header class="glass-panel header">
      <h1><span class="highlight">SCADA</span> I/O Panel</h1>
      <div class="status-indicator">
        <div id="connection-dot" class="dot disconnected"></div>
        <span id="connection-status">Connecting to Firebase...</span>
      </div>
    </header>

    <main class="grid-layout">
      <!-- 10 Lampu Indikator Section -->
      <section class="glass-panel widget io-panel">
        <h2>Output PLC (Indikator)</h2>
        <p class="subtitle">Membaca Modbus Register 0 - 9</p>
        <div class="indicator-grid" id="indicator-container">
          <!-- Digenerate oleh app.js -->
        </div>
      </section>

      <!-- 10 Saklar Control Section -->
      <section class="glass-panel widget io-panel">
        <h2>Input PLC (Kontrol)</h2>
        <p class="subtitle">Menulis Modbus Register 10 - 19</p>
        <div class="control-grid" id="control-container">
          <!-- Digenerate oleh app.js -->
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
